name: Plone Documentation
desc: Plone is a free and open source content management system that is used to create, edit, and manage digital content. Plone is an open source content management system that is used to create, edit, and manage digital content, like websites, intranets and custom solutions. It comes with over 20 years of growth, optimizations, and refinements. The result is a system trusted by governments, universities, businesses, and other organizations all over the world.
