<button
  id="view-mode-toggle"
  class="theme-selector"
  type="button"
  title="Toggle dark mode"
  aria-pressed="false"
>
  <span class="visually-hidden">Toggle dark mode</span>
  <img id="view-mode" alt="" src="/images/Dim-Night.png" />
</button>

<header role="banner">
  <a id="beta_site_banner" href="/beta/index.html"
    ><span>Try out the new site</span>
    <img class="rocket" src="/images/rocket-24.svg"
  /></a>
  <a id="forkme_banner" href="https://github.com/up-for-grabs/up-for-grabs.net"
    >View on GitHub</a
  >
  <div class="container">
    <a id="go-back-home-a" href="/#/"
      ><img
        id="go-back-home"
        src="{{ site.github.url }}/images/logo.png"
        alt="Up For Grabs"
    /></a>
    <h1 class="ribbon">
      <strong class="ribbon-content"
        >Explore open source projects and jump in!</strong
      >
    </h1>
  </div>
</header>
